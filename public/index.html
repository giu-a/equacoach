<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EquaCoach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell" role="main">
    <header class="topbar" aria-label="Barra superiore">
      <div class="brand-wrap">
        <div class="brand-badge" aria-hidden="true">∑</div>
        <div>
          <h1 id="appTitle">EquaCoach</h1>
          <p id="appSubtitle">Allenati con le equazioni di primo grado</p>
        </div>
      </div>
      <div class="lang-picker-wrap">
        <label for="languagePicker" class="sr-only">Lingua</label>
        <select id="languagePicker" aria-label="Selettore lingua">
          <option value="it">Italiano</option>
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>
    </header>

    <section id="authSection" class="card" aria-labelledby="authTitle">
      <h2 id="authTitle">Profilo studente</h2>
      <div class="tabs" role="tablist">
        <button id="tabSignup" class="tab active" role="tab" aria-selected="true">Registrazione</button>
        <button id="tabLogin" class="tab" role="tab" aria-selected="false">Accesso</button>
      </div>

      <form id="signupForm" class="form-grid" novalidate>
        <label>
          <span id="labelEmailSignup">Username (e-mail)</span>
          <input id="signupEmail" type="email" required autocomplete="email" />
        </label>
        <label>
          <span id="labelPasswordSignup">Password</span>
          <input id="signupPassword" type="password" required minlength="6" autocomplete="new-password" />
        </label>
        <label>
          <span id="labelNickname">Nick name</span>
          <input id="signupNickname" type="text" required maxlength="20" />
        </label>
        <label>
          <span id="labelAvatar">Foto profilo (URL oppure Base64)</span>
          <input id="signupAvatar" type="text" placeholder="https://..." />
        </label>
        <button id="signupButton" type="submit" class="primary-btn">Crea account</button>
      </form>

      <form id="verifyForm" class="form-grid hidden" novalidate>
        <p id="verifyInfo" class="info"></p>
        <label>
          <span id="labelVerifyCode">Codice temporaneo</span>
          <input id="verifyCode" type="text" inputmode="numeric" maxlength="6" />
        </label>
        <div class="actions-inline">
          <button id="verifyButton" type="submit" class="primary-btn">Conferma account</button>
          <button id="resendCode" type="button" class="ghost-btn">Reinvia codice</button>
        </div>
      </form>

      <form id="loginForm" class="form-grid hidden" novalidate>
        <label>
          <span id="labelEmailLogin">Username (e-mail)</span>
          <input id="loginEmail" type="email" required autocomplete="email" />
        </label>
        <label>
          <span id="labelPasswordLogin">Password</span>
          <input id="loginPassword" type="password" required autocomplete="current-password" />
        </label>
        <button id="loginButton" type="submit" class="primary-btn">Accedi</button>
      </form>
      <p id="authMessage" class="status" aria-live="polite"></p>
    </section>

    <section id="appSection" class="hidden" aria-labelledby="coachTitle">
      <div class="profile-card card">
        <div class="profile-head">
          <img id="profileAvatar" src="" alt="Foto profilo utente" class="avatar" />
          <div>
            <h2 id="profileNick"></h2>
            <p id="profileMail"></p>
          </div>
          <button id="logoutButton" class="ghost-btn">Esci</button>
        </div>
      </div>

      <div class="panel-grid">
        <article class="card" aria-labelledby="coachTitle">
          <h2 id="coachTitle">Allenamento equazioni</h2>
          <div class="row">
            <label for="difficultySelect" id="difficultyLabel">Difficoltà</label>
            <select id="difficultySelect">
              <option value="easy">Facile</option>
              <option value="medium">Media</option>
              <option value="hard">Difficile (frazioni)</option>
            </select>
            <button id="generateEquation" class="primary-btn">Nuova equazione AI</button>
          </div>
          <p id="equationText" class="equation" aria-live="polite">-</p>

          <form id="answerForm" class="row" novalidate>
            <label for="userAnswer" class="sr-only">Soluzione x</label>
            <input id="userAnswer" type="text" inputmode="decimal" placeholder="x = (es: 3, -2, 3/2)" />
            <button id="checkAnswer" class="primary-btn" type="submit">Verifica</button>
          </form>

          <div id="verificationBlock" class="verify-box hidden" aria-live="polite"></div>

          <button id="showSteps" class="ghost-btn hidden">Mostra soluzione passo passo</button>
          <ol id="stepsList" class="steps"></ol>
        </article>

        <article class="card" aria-labelledby="rankingTitle">
          <h2 id="rankingTitle">Ranking e obiettivi</h2>
          <div id="benchmarks" class="mini-cards"></div>
          <h3 id="personalStatsTitle">Le tue performance</h3>
          <div id="personalStats" class="mini-cards"></div>
          <h3 id="leaderboardTitle">Classifica partecipanti</h3>
          <ul id="leaderboard" class="leaderboard"></ul>
          <h3 id="achievementsTitle">Premi e badge</h3>
          <ul id="achievements" class="achievements"></ul>
        </article>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
